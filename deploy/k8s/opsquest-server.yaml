apiVersion: v1
kind: Namespace
metadata:
  name: opsquest
---
apiVersion: v1
kind: Secret
metadata:
  name: opsquest-server
  namespace: opsquest
type: Opaque
stringData:
  # CHANGE-ME: replace every example value before applying this manifest.
  SESSION_SECRET: CHANGE-ME-long-random-session-secret
  ADMIN_USER: CHANGE-ME-admin
  ADMIN_PASSWORD: CHANGE-ME-strong-bootstrap-password
  # DATABASE_URL is recommended for production; uncomment it and remove the
  # SQLite volume mount when using a managed PostgreSQL database.
  # DATABASE_URL: postgresql://CHANGE-ME
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opsquest-data
  namespace: opsquest
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsquest-server
  namespace: opsquest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opsquest-server
  template:
    metadata:
      labels:
        app: opsquest-server
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: server
          image: ghcr.io/spillers-technology/opsquest-server:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: opsquest-server
          env:
            - name: SQLITE_PATH
              value: /app/data/opsquest.db
            - name: COOKIE_SECURE
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
          # This PVC is suitable for a single-replica SQLite deployment.
          # DATABASE_URL backed by PostgreSQL is recommended for production.
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: opsquest-data
---
apiVersion: v1
kind: Service
metadata:
  name: opsquest-server
  namespace: opsquest
spec:
  type: ClusterIP
  selector:
    app: opsquest-server
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opsquest-server
  namespace: opsquest
spec:
  ingressClassName: nginx
  rules:
    - host: opsquest.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opsquest-server
                port:
                  name: http
  # tls:
  #   - hosts:
  #       - opsquest.example.com
  #     secretName: opsquest-tls
