name: Feature request
description: Propose a focused improvement from the operator's point of view.
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Operator problem
      description: Describe the job, handoff, or recurring pain—not just the feature name.
    validations:
      required: true
  - type: textarea
    id: today
    attributes:
      label: How is it handled today?
      description: Workarounds, manual steps, and where the current approach fails.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Smallest useful outcome
      description: What is the narrowest change that would materially improve the workflow?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: help
    attributes:
      label: Contribution
      options:
        - label: I would be willing to help test this.
        - label: I would be willing to open a pull request after scope is agreed.
